name: Refresh NBA Team Stats

# NBA.com blocks cloud IPs — this action is disabled.
# Run locally instead: node scripts/refresh-team-stats.js
# Keeping file for future proxy/alternative API migration.

on:
  workflow_dispatch: # Manual trigger only

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch NBA.com stats and write to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/refresh-team-stats.js
